<!DOCTYPE html>
<html>
<head>
    <title>Heart Disease Predictor</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background:#f4f7fb;
            margin:0;
            padding:40px;
        }

        .container{
            width:700px;
            margin:auto;
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0 0 15px rgba(0,0,0,0.1);
        }

        h1{
            text-align:center;
            color:#1f4e79;
        }

        .row{
            margin-bottom:15px;
        }

        label{
            display:block;
            margin-bottom:5px;
            font-weight:bold;
        }

        input, select{
            width:100%;
            padding:10px;
            border:1px solid #ccc;
            border-radius:5px;
        }

        button{
            width:100%;
            padding:12px;
            background:#1f4e79;
            color:white;
            border:none;
            border-radius:5px;
            font-size:16px;
            cursor:pointer;
        }

        button:hover{
            background:#163b5d;
        }

        .result{
            margin-top:25px;
            padding:15px;
            background:#e8f3ff;
            border-radius:5px;
            text-align:center;
            font-size:22px;
            font-weight:bold;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>❤️ Heart Disease Predictor</h1>

    <form action="/predict" method="POST">

        <div class="row">
            <label>Age</label>
            <input type="number" name="age">
        </div>

        <div class="row">
            <label>Sex</label>
            <select name="sex">
                <option>M</option>
                <option>F</option>
            </select>
        </div>

        <div class="row">
            <label>Chest Pain Type</label>
            <select name="chest_pain">
                <option>ATA</option>
                <option>NAP</option>
                <option>TA</option>
                <option>ASY</option>
            </select>
        </div>

        <div class="row">
            <label>Resting Blood Pressure</label>
            <input type="number" name="resting_bp" value="120"//>
        </div>

        <div class="row">
            <label>Cholesterol</label>
            <input type="number" name="cholesterol">
        </div>

        <div class="row">
            <label>Fasting Blood Sugar >120 </label>
            <select name="fasting_bs">
                <option value="0">No</option>
                <option value="1">Yes</option>
            </select>
        </div>

        <div class="row">
            <label>Resting ECG</label>
            <select name="resting_ecg">
                <option>Normal</option>
                <option>ST</option>
                <option>LVH</option>
            </select>
        </div>

        <div class="row">
            <label>Maximum Heart Rate</label>
            <input type="number" name="max_hr" value="150">
        </div>

        <div class="row">
            <label>Exercise Angina</label>
            <select name="exercise_angina">
                <option>Y</option>
                <option>N</option>
            </select>
        </div>

        <div class="row">
            <label>Oldpeak</label>
            <input type="number"
                   step="0.1"
                   name="oldpeak"
                   value="1.0">
        </div>

        <div class="row">
            <label>ST Slope</label>
            <select name="st_slope">
                <option>Up</option>
                <option>Flat</option>
                <option>Down</option>
            </select>
        </div>

        <button type="submit">
            Predict Heart Disease Risk
        </button>

    </form>

    {% if prediction %}
    <div class="result">
        {{ prediction }}
    </div>
    {% endif %}

</div>

</body>
</html>
